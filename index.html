<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - nittany34.store</title>


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Relief:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <h1 class="font" style="text-align: center;">Nittany34.store</h1>

    <a href="products.html" class="button-link">View Products</a>


    <style>
        .font {
            font-family: Comic Relief;

        }


        .button-link {
            color: rgb(237, 239, 241);
            text-decoration: none;
            background-color: rgb(212, 0, 255);
            padding: 15px;
            border-radius: 30px;
            font-family: Comic Relief;
            font-size: 13px;
            font-weight: 300;


            display: block;
            margin-left: auto;
            margin-right: auto;
            width: fit-content;
            transition: 300ms;

        }

        .button-link:hover {
            color: rgb(237, 239, 241);
            text-decoration: none;
            background-color: rgb(212, 0, 255);
            animation: simpleBounce 0.8s ease-in-out infinite alternate;
            border-radius: 30px;
            font-family: Comic Relief;
            font-size: 13px;

            animation: bouncyFloat 4s ease-in-out infinite;
        }


        @keyframes bouncyFloat {


            100% {
                transform: translateY(0px) scaleY(1);
            }







            75% {
                transform: translateY(5px) scaleY(1);

            }
        }
    </style>
</body>

</html>
